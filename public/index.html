<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Simulator Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>OS Setup</h2>
            <label>Arrival Times (P1, P2, P3)</label>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="number" id="arr1" value="0" min="0">
                <input type="number" id="arr2" value="1" min="0">
                <input type="number" id="arr3" value="4" min="0">
            </div>
            <label>Scheduling Algorithm</label>
            <select id="algorithm">
                <option value="1">HRRN</option>
                <option value="2">Round Robin</option>
                <option value="3">MLFQ</option>
            </select>

            <div id="quantum-div" style="display: none;">
                <label>Time Quantum (Q)</label>
                <input type="number" id="quantum" value="2" min="1">
            </div>

            <button id="start-btn">Boot OS</button>
            
            <div class="widget">
                <h3>Clock Cycle</h3>
                <div id="cycle-display">0</div>
            </div>
        </aside>

        <main class="terminal-container">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="title">OS Execution Trace</span>
            </div>
            <pre id="terminal"></pre>
            <div class="input-container" style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="terminal-input" placeholder="Type here when OS asks for input..." style="flex-grow: 1;">
                <button id="send-btn" style="width: 100px;">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
